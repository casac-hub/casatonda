<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Casatonda</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --t2:#C0DD97;--t2t:#27500A;--t3:#FAC775;--t3t:#633806;--t4:#F4C0D1;--t4t:#72243E;--t1:#B5D4F4;--t1t:#0C447C;
  --bk:#378ADD;--di:#E6A817;--ab:#E24B4A;--al:#7F77DD;
  --bg:#f5f5f5;--card:#fff;--border:#e0e0e0;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --info:#185FA5;--success:#3B6D11;--danger:#A32D2D;
  --r-md:8px;--r-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* LOADING */
.loading{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.loading.hidden{display:none;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* HEADER */
.hdr{background:var(--text);color:white;padding:10px 14px;position:sticky;top:0;z-index:50;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hdr-logo{font-size:17px;font-weight:500;}
.hdr-logo span{opacity:0.5;}
.casa-sel{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:white;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
.casa-sel option{background:#1a1a1a;color:white;}
.profiles{display:flex;gap:6px;flex-wrap:wrap;}
.pb{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);font-size:12px;font-weight:500;cursor:pointer;}
.pb.on{background:white;color:var(--text);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);overflow-x:auto;scrollbar-width:none;position:sticky;top:92px;z-index:40;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 16px;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;white-space:nowrap;}
.tab.on{color:var(--text);border-bottom-color:var(--text);font-weight:500;}

.sec{display:none;padding:12px;max-width:700px;margin:0 auto;}
.sec.on{display:block;}

/* COMMON */
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.mnav button{background:none;border:1px solid var(--border);border-radius:var(--r-md);padding:5px 12px;cursor:pointer;font-size:15px;}
.mnav-lbl{font-size:15px;font-weight:500;flex:1;text-align:center;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.sbox{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:10px;text-align:center;}
.sbox .sv{font-size:19px;font-weight:500;}
.sbox .sl{font-size:10px;color:var(--text2);margin-top:2px;}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--r-lg);}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);}
.ld{width:24px;height:10px;border-radius:2px;}
.card{background:white;border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px;}
.card h3{font-size:15px;font-weight:600;margin-bottom:12px;}
.lbl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
.row-bw{display:flex;justify-content:space-between;align-items:center;}

/* PRENOTAZIONI CAL */
.cal{border-collapse:separate;border-spacing:0;font-size:11px;min-width:max-content;width:100%;}
.cal th{background:#f8f8f8;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;position:sticky;top:0;}
.cal th.thc{position:sticky;left:0;z-index:20;background:#f8f8f8;text-align:left;padding:6px 8px;font-size:10px;color:var(--text2);font-weight:500;border-right:2px solid var(--border);min-width:80px;}
.thd{text-align:center;padding:4px 0;min-width:34px;width:34px;}
.thd.we{color:#E6A817;}.thd.tod{color:var(--info);font-weight:600;}
.thd-n{font-size:12px;font-weight:500;display:block;}
.thd-g{font-size:9px;display:block;opacity:0.6;}
.cal td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;height:42px;vertical-align:middle;position:relative;background:white;}
.cal td.tdc{position:sticky;left:0;z-index:5;background:white;border-right:2px solid var(--border);padding:5px 8px;}
.cn{font-weight:500;font-size:11px;}.cs{font-size:9px;color:var(--text3);margin-top:1px;}
.dc{width:34px;height:42px;cursor:pointer;position:relative;}
.dc.tod{outline:2px solid var(--info);outline-offset:-2px;z-index:2;}
.dc:hover{background:#f5f5f5 !important;}
.bb{position:absolute;top:5px;bottom:5px;left:0;right:0;display:flex;align-items:center;overflow:hidden;}
.bb.ci{left:50%;border-radius:5px 0 0 5px;}.bb.co{right:calc(100% - 50%);border-radius:0 5px 5px 0;}.bb.solo{left:20%;right:20%;border-radius:5px;}
.b-bk{background:var(--bk);color:white;}.b-di{background:var(--di);color:white;}.b-ab{background:var(--ab);color:white;}.b-al{background:var(--al);color:white;}
.bl{font-size:9px;font-weight:500;white-space:nowrap;padding:0 3px;overflow:hidden;text-overflow:ellipsis;}
.fc{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.fc:hover::after{content:'+';}

/* TURNI GRID */
.gt{border-collapse:separate;border-spacing:0;font-size:11px;min-width:max-content;width:100%;}
.gt th{background:#f8f8f8;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;position:sticky;top:0;}
.gt th.gtp{position:sticky;left:0;z-index:20;background:#f8f8f8;text-align:left;padding:6px 8px;font-size:10px;font-weight:500;color:var(--text2);border-right:2px solid var(--border);min-width:86px;}
.gtd-h{text-align:center;padding:4px 0;min-width:46px;width:46px;}
.gtd-h.we{color:#E6A817;}.gtd-h.tod{color:var(--info);font-weight:600;}
.gt td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:0;height:46px;vertical-align:middle;cursor:pointer;background:white;}
.gt td.gtp-cell{position:sticky;left:0;z-index:5;background:white;border-right:2px solid var(--border);padding:6px 8px;cursor:default;}
.pn{font-weight:500;font-size:12px;}.pr{font-size:9px;color:var(--text3);margin-top:1px;}
.gt-cell{width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.tt{border-radius:3px;padding:2px 5px;font-size:9px;font-weight:500;display:block;text-align:center;}
.tt1{background:var(--t1);color:var(--t1t);}.tt2{background:var(--t2);color:var(--t2t);}.tt3{background:var(--t3);color:var(--t3t);}.tt4{background:var(--t4);color:var(--t4t);}
.cm{font-size:8px;color:var(--text3);line-height:1.2;text-align:center;}

/* COMPENSI */
.comp-t{width:100%;border-collapse:collapse;font-size:12px;}
.comp-t th{text-align:left;font-size:10px;color:var(--text2);padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;}
.comp-t td{padding:10px 8px;border-bottom:1px solid #f0f0f0;}
.comp-t tr:last-child td{border-bottom:none;}
.amt{font-weight:600;color:var(--info);}
.tot-bar{background:#f0f5ff;border-radius:var(--r-md);padding:14px;margin-top:10px;display:flex;justify-content:space-between;align-items:center;}
.tot-v{font-size:24px;font-weight:600;color:var(--info);}

/* RIEPILOGO */
.rp{background:white;border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:10px;}
.rph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.rpn{font-size:15px;font-weight:600;}.rpr{font-size:10px;color:var(--text2);margin-top:2px;}.rpt{font-size:22px;font-weight:600;}
.rpb{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.rpi{background:#f8f8f8;border-radius:var(--r-md);padding:8px;text-align:center;}
.rpi .rl{font-size:10px;color:var(--text2);}.rpi .rv{font-size:14px;font-weight:500;margin-top:2px;}
.pagbtn{width:100%;margin-top:10px;padding:9px;border-radius:var(--r-md);border:1px dashed var(--border);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;}
.pagbtn.pg{background:#f0faf0;color:var(--success);border:1px solid var(--success);font-weight:500;}

/* MIO MESE */
.mio-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.giorno-box{border-radius:var(--r-md);padding:6px 2px;text-align:center;min-height:56px;border:1px solid var(--border);background:white;}
.giorno-box.oggi{outline:2px solid var(--info);outline-offset:-2px;}
.gb-num{font-size:12px;font-weight:500;margin-bottom:3px;}
.gb-num.oggi-n{background:var(--text);color:white;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;font-size:11px;}
.gb-tag{font-size:8px;font-weight:500;padding:1px 3px;border-radius:2px;display:block;margin:1px auto;max-width:36px;}
.gb-cam{font-size:7px;color:var(--text3);margin-top:1px;}

/* CAMERA STATUS */
.cam-status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.cam-status-card{border-radius:var(--r-lg);padding:14px;border:2px solid var(--border);background:white;}
.cam-status-card.pronta{background:#f0faf0;border-color:var(--success);}
.cam-num-big{font-size:18px;font-weight:600;margin-bottom:2px;}
.cam-name-s{font-size:10px;color:var(--text2);}
.cam-osp{font-size:11px;margin-top:4px;color:var(--text2);}
.cam-stato{font-size:11px;font-weight:500;margin-top:6px;}
.cam-pronta-btn{width:100%;padding:11px;border-radius:var(--r-md);border:none;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.cam-pronta-btn.da-fare{background:var(--t2);color:var(--t2t);}
.cam-pronta-btn.fatta{background:#f0faf0;color:var(--success);border:1px solid var(--success);}

/* EXTRA */
.extra-section{margin-top:16px;background:#fffbf0;border-radius:var(--r-lg);padding:14px;border:1px solid #f0e0a0;}
.extra-title{font-size:14px;font-weight:600;margin-bottom:12px;}
.extra-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.extra-item{border-radius:var(--r-md);border:2px solid var(--border);padding:10px 6px;cursor:pointer;background:white;text-align:center;}
.extra-item.sel{border-color:var(--t3t);background:var(--t3);}
.ei-icon{font-size:20px;margin-bottom:3px;}
.ei-name{font-size:11px;font-weight:600;}
.ei-price{font-size:10px;color:var(--text2);margin-top:1px;}
.extra-item.sel .ei-price{color:var(--t3t);}
.extra-vetri{border-radius:var(--r-md);border:1px solid var(--border);padding:12px;background:white;margin-bottom:10px;}
.extra-vetri-title{font-size:12px;font-weight:600;margin-bottom:8px;}
.vetri-cam-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.vetri-cam{padding:8px 3px;border-radius:var(--r-md);border:1px solid var(--border);text-align:center;font-size:10px;cursor:pointer;background:white;font-weight:500;}
.vetri-cam.sel{background:var(--t2);color:var(--t2t);border-color:var(--t2t);}
.ore-extra{border-radius:var(--r-md);border:1px solid var(--border);padding:12px;background:white;margin-bottom:10px;}
.ore-extra label{font-size:12px;font-weight:600;display:block;margin-bottom:8px;}
.ore-input{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ore-field{display:flex;flex-direction:column;align-items:center;gap:4px;}
.ore-field label{font-size:10px;color:var(--text2);}
.ore-field input{width:60px;border:1px solid var(--border);border-radius:var(--r-md);padding:8px;font-size:16px;font-weight:600;text-align:center;font-family:inherit;}
.note-extra{width:100%;border:1px solid var(--border);border-radius:var(--r-md);padding:10px;font-size:13px;font-family:inherit;resize:none;margin-bottom:10px;background:white;}
.extra-summary{background:white;border-radius:var(--r-md);padding:12px;margin-bottom:10px;border:1px solid #f0e0a0;}
.extra-summary-title{font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;font-weight:500;}
.extra-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.extra-total{display:flex;justify-content:space-between;font-size:15px;font-weight:600;padding-top:8px;margin-top:6px;border-top:1px solid var(--border);}

.mt-card{background:#f8f8f8;border-radius:var(--r-lg);padding:16px;margin-bottom:12px;border-left:4px solid var(--border);}
.mt-tit{font-size:16px;font-weight:600;margin-bottom:3px;}
.mt-ora{font-size:12px;color:var(--text2);margin-bottom:8px;}

/* POPUP */
.pbg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.pbox{background:white;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.pbox h3{font-size:17px;font-weight:600;margin-bottom:3px;}
.psub{font-size:12px;color:var(--text2);margin-bottom:16px;}
.pcl{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);margin-top:-4px;}
.topts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.topt{padding:12px;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer;text-align:center;font-size:13px;}
.topt.st1{border:2px solid var(--t1t);background:var(--t1);color:var(--t1t);font-weight:500;}
.topt.st2{border:2px solid var(--t2t);background:var(--t2);color:var(--t2t);font-weight:500;}
.topt.st3{border:2px solid var(--t3t);background:var(--t3);color:var(--t3t);font-weight:500;}
.topt.st4{border:2px solid var(--t4t);background:var(--t4);color:var(--t4t);font-weight:500;}
.ckopts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.cko{padding:8px 3px;border-radius:var(--r-md);border:1px solid var(--border);cursor:pointer;text-align:center;font-size:10px;}
.cko.ck{background:var(--t2);color:var(--t2t);border-color:var(--t2t);font-weight:500;}
.cko .cn2{font-size:12px;font-weight:500;}
.canopts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
.canopt{padding:9px 4px;border-radius:var(--r-md);border:1px solid var(--border);text-align:center;cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);}
.canopt.sbk{background:#E6F1FB;color:#0C447C;border-color:var(--bk);}
.canopt.sdi{background:#FEF7E0;color:#7A5200;border-color:var(--di);}
.canopt.sab{background:#FCEBEB;color:#791F1F;border-color:var(--ab);}
.canopt.sal{background:#EEEDFE;color:#26215C;border-color:var(--al);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg.f1{grid-template-columns:1fr;}
.fl label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.fl input,.fl select{width:100%;border:1px solid var(--border);border-radius:var(--r-md);padding:10px 12px;font-size:13px;font-family:inherit;}
.det{background:#f8f8f8;border-radius:var(--r-md);padding:12px;margin-bottom:14px;}
.dr{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);}
.dr:last-child{border-bottom:none;}
.dr span:first-child{color:var(--text2);}.dr span:last-child{font-weight:500;}
.bsave{width:100%;padding:13px;border-radius:var(--r-md);border:none;background:var(--text);color:white;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
.bdel{width:100%;padding:10px;border-radius:var(--r-md);border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:13px;cursor:pointer;margin-top:8px;}
.bcan{width:100%;padding:10px;border-radius:var(--r-md);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;margin-top:6px;}
.bcl{width:100%;padding:10px;border-radius:var(--r-md);border:1px solid var(--danger);background:transparent;color:var(--danger);font-size:13px;cursor:pointer;margin-top:6px;}
.bdg{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.bdg-bk{background:#E6F1FB;color:#0C447C;}.bdg-di{background:#FEF7E0;color:#7A5200;}
.bdg-ab{background:#FCEBEB;color:#791F1F;}.bdg-al{background:#EEEDFE;color:#26215C;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;padding:12px 20px;border-radius:var(--r-md);font-size:13px;z-index:999;transition:transform 0.25s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text2);">Caricamento...</div>
</div>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">Casa<span>tonda</span></div>
    <select class="casa-sel" id="casa-sel" onchange="setCasa(this.value)">
      <option value="piumogna">🏠 Casa Piumogna</option>
      <option value="cvb">🍷 Casa Vino e Birra</option>
      <option value="liberty">🌸 Casa Liberty</option>
      <option value="rustico">🌿 Rustico Conceprio</option>
      <option value="rurale">🌾 Casa Rurale</option>
    </select>
  </div>
  <div class="profiles" id="profiles-bar"></div>
</div>

<div class="tabs" id="tabs-bar"></div>

<div class="sec" id="sec-pren">
  <div class="row-bw" style="margin-bottom:10px;"><div class="mnav" style="margin:0;"><button onclick="chM(-1)">&#8249;</button><span class="mnav-lbl" id="mlbl-p"></span><button onclick="chM(1)">&#8250;</button></div></div>
  <div class="stats" id="stats-p"></div>
  <div class="leg"><div class="li"><div class="ld" style="background:var(--bk)"></div>Booking</div><div class="li"><div class="ld" style="background:var(--di)"></div>Interno</div><div class="li"><div class="ld" style="background:var(--ab)"></div>Airbnb</div><div class="li"><div class="ld" style="background:var(--al)"></div>Altro</div></div>
  <div class="scroll-x"><table class="cal" id="cal-p"></table></div>
</div>

<div class="sec" id="sec-turni">
  <div class="row-bw" style="margin-bottom:10px;"><div class="mnav" style="margin:0;"><button onclick="chM(-1)">&#8249;</button><span class="mnav-lbl" id="mlbl-t"></span><button onclick="chM(1)">&#8250;</button></div><label id="import-btn" style="background:#f0f5ff;border:1px solid var(--info);color:var(--info);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:500;cursor:pointer;display:none;">&#128229; Importa ODS<input type="file" accept=".ods,.xlsx" style="display:none;" onchange="importaTurni(this)"></label></div>
  <div class="leg"><div class="li"><div class="ld" style="background:var(--t1)"></div>T1</div><div class="li"><div class="ld" style="background:var(--t2)"></div>T2</div><div class="li"><div class="ld" style="background:var(--t3)"></div>T3</div><div class="li"><div class="ld" style="background:var(--t4)"></div>T4</div></div>
  <div class="scroll-x"><table class="gt" id="grid-t"></table></div>
</div>

<div class="sec" id="sec-comp">
  <div class="card">
    <div class="row-bw" style="margin-bottom:12px;"><h3 style="margin:0;">Compensi</h3><div style="display:flex;gap:6px;"><button onclick="chD(-1)" style="background:none;border:1px solid var(--border);border-radius:var(--r-md);padding:4px 10px;cursor:pointer;font-size:15px;">&#8249;</button><span style="font-size:13px;font-weight:500;padding:4px 8px;" id="dlbl-c"></span><button onclick="chD(1)" style="background:none;border:1px solid var(--border);border-radius:var(--r-md);padding:4px 10px;cursor:pointer;font-size:15px;">&#8250;</button></div></div>

async function loadPren(){
  const Y=vMonth.getFullYear(),M=vMonth.getMonth();
  const from=fmtD(new Date(Y,M,1)),to=fmtD(new Date(Y,M+1,0));
  const {data,error}=await sb.from('prenotazioni')
    .select('*')
    .eq('casa_id',casaId)
    .gte('co',from)
    .lte('ci',to);
  if(!error&&data){
    if(!prenCache[casaId])prenCache[casaId]=[];
    // Unisci con dati già in cache di altri mesi
    const ids=data.map(p=>p.id);
    prenCache[casaId]=prenCache[casaId].filter(p=>!ids.includes(p.id));
    prenCache[casaId].push(...data);
  }
}

    .select('*')
    .eq('casa_id',casaId)
    .gte('data',from)
    .lte('data',to);
  if(!error&&data){
    data.forEach(t=>{
      const key=casaId+'_'+t.data;
      if(!turniCache[key])turniCache[key]={};
      turniCache[key][t.persona]={t:t.turno,c:t.camere||[],note:t.note||''};

function buildUI(){

  if(isAdmin())tabs+=`<div class="tab${curTab==='pren'?' on':''}" data-t="pren" onclick="sw('pren')">Prenotazioni</div>`;
  tabs+=`<div class="tab${curTab==='turni'?' on':''}" data-t="turni" onclick="sw('turni')">Turni</div>`;
  if(isAdmin()){tabs+=`<div class="tab${curTab==='comp'?' on':''}" data-t="comp" onclick="sw('comp')">Compensi</div>`;tabs+=`<div class="tab${curTab==='riepilogo'?' on':''}" data-t="riepilogo" onclick="sw('riepilogo')">Riepilogo</div>`;}
  else tabs+=`<div class="tab${curTab==='mio'?' on':''}" data-t="mio" onclick="sw('mio')">Il mio mese</div>`;

  const ib=document.getElementById("import-btn");if(ib)ib.style.display=isAdmin()?"":"none";

function sw(t){
  curTab=t;buildUI();
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));
  document.getElementById('sec-'+t).classList.add('on');
  if(t==='pren')renderPren();
  if(t==='turni')renderTurni();
  if(t==='comp')renderComp();
  if(t==='riepilogo')renderRiep();
  if(t==='mio')renderMio();
}

function renderAll(){
  document.querySelectorAll('.sec').forEach(x=>x.classList.remove('on'));

  if(curTab==='pren')renderPren();
  else if(curTab==='turni')renderTurni();
  else if(curTab==='comp')renderComp();
  else if(curTab==='riepilogo')renderRiep();
  else if(curTab==='mio')renderMio();

// RENDER PRENOTAZIONI
// ═══════════════════════════════════════════
function renderPren(){
  if(!isAdmin())return;
  const Y=vMonth.getFullYear(),M=vMonth.getMonth(),days=new Date(Y,M+1,0).getDate();
  document.getElementById('mlbl-p').textContent=MESI[M]+' '+Y;
  const ms=fmtD(new Date(Y,M,1)),me=fmtD(new Date(Y,M,days));
  const arr=prenCache[casaId]||[];
  let notti=0,ent=0;
  arr.forEach(p=>{if(p.ci<=me&&p.co>ms){const s=p.ci<ms?ms:p.ci,e=p.co>me?fmtD(addD(new Date(Y,M,days),1)):p.co;const n=diffD(s,e);notti+=n;ent+=n*(p.tar||0);}});
  const occ=Math.round(notti/(days*casa().camere.length)*100);
  document.getElementById('stats-p').innerHTML=`<div class="sbox"><div class="sv">${occ}%</div><div class="sl">Occupazione</div></div><div class="sbox"><div class="sv">${notti}</div><div class="sl">Notti</div></div><div class="sbox"><div class="sv" style="color:var(--success)">Fr.${ent.toLocaleString('it-CH')}</div><div class="sl">Entrate</div></div>`;
  let th='<thead><tr><th class="thc">Camera</th>';
  for(let d=1;d<=days;d++){const dt=new Date(Y,M,d),k=fmtD(dt),dw=dt.getDay();th+=`<th class="thd${dw===0||dw===6?' we':''}${k===TK?' tod':''}"><span class="thd-n">${d}</span><span class="thd-g">${GG[dw]}</span></th>`;}
  th+='</tr></thead><tbody>';
  casa().camere.forEach(cam=>{
    th+=`<tr><td class="tdc"><div class="cn">${cam.n}</div><div class="cs">${cam.nm}</div></td>`;
    for(let d=1;d<=days;d++){const dt=new Date(Y,M,d),k=fmtD(dt),it=k===TK,p=getPren(cam.n,k);let ct='';
      if(p){const isCI=p.ci===k,isCO=fmtD(addD(parseD(p.co),-1))===k;let bc='bb b-'+(CL[p.can]||'al');if(isCI&&isCO)bc+=' solo';else if(isCI)bc+=' ci';else if(isCO)bc+=' co';ct=`<div class="${bc}" onclick="openDet('${p.id}',event)"><span class="bl">${isCI?(p.nome||'')+(p.osp?'('+p.osp+')':''):''}</span></div>`;}
      else ct=`<div class="fc" onclick="openNew('${cam.n}','${k}',event)"></div>`;
      th+=`<td class="dc${it?' tod':''}">${ct}</td>`;}
    th+='</tr>';
  });
  document.getElementById('cal-p').innerHTML=th+'</tbody>';
}

    th+=`<tr><td class="gtp-cell"><div class="pn">${p}</div></td>`;

      const ex=extraCache[casaId+'_'+k+'_'+p];
      const hasEx=ex&&(Object.values(ex.items||{}).some(v=>v)||(ex.vetri&&ex.vetri.length>0)||ex.letti>0||ex.ore>0||ex.min>0);
      let ct='<div class="gt-cell">';
      if(tp){ct+=`<span class="tt ${tp.t==='T1'?'tt1':tp.t==='T2'?'tt2':tp.t==='T3'?'tt3':'tt4'}">${tp.t}</span>`;if(tp.c&&tp.c.length)ct+=`<div class="cm">${tp.c.slice(0,2).join(' ')}</div>`;}
      if(hasEx)ct+=`<div style="font-size:8px;color:var(--t3t);background:var(--t3);border-radius:2px;padding:1px 3px;margin-top:1px;">+</div>`;
      ct+='</div>';
      th+=`<td class="dc${it?' tod':''}" onclick="${isAdmin()?`openTurno('${k}','${p.replace(/'/g,"\\'")}',event)`:''}">${ct}</td>`;}
    th+='</tr>';
  });
  document.getElementById('grid-t').innerHTML=th+'</tbody>';
}

// EXTRA

function calcExTot(ex,camName){
  let t=0;
  const c=casa();
  c.extras.forEach(e=>{if(ex.items[e.id])t+=e.prezzo;});
  if(c.hasVetri&&ex.vetri){if(c.vetriPrezzi){ex.vetri.forEach(v=>{t+=(c.vetriPrezzi[v]||0);});}else{t+=ex.vetri.length*(c.vetriPrezzo||0);}}
  if(c.hasLetti)t+=ex.letti*(c.lettoPrezzzo||0);
  if(c.tariffeCam&&camName&&c.tariffeCam[camName])t+=c.tariffeCam[camName];
  return t;
}

function buildExtra(key,persona,camName){
  const ex=getEx(key,persona);
  const c=casa();
  const showPrices=isAdmin();
  const items=c.extras.map(e=>`<div class="extra-item${ex.items[e.id]?' sel':''}" onclick="togExItem('${key}','${persona.replace(/'/g,"\\'")}','${e.id}')"><div class="ei-icon">${e.icon}</div><div class="ei-name">${e.nome}</div>${showPrices?`<div class="ei-price">Fr.${e.prezzo}</div>`:''}</div>`).join('');
  let vetriHtml='';
  if(c.hasVetri){
    const vp=c.vetriPrezzi?c.camere.map(cam=>`<div class="vetri-cam${ex.vetri.includes(cam.n)?' sel':''}" onclick="togVetri('${key}','${persona.replace(/'/g,"\\'")}','${cam.n}')">${cam.n}${showPrices?`<br><span style="font-size:9px">Fr.${c.vetriPrezzi[cam.n]||0}</span>`:''}</div>`).join(''):
    c.camere.map(cam=>`<div class="vetri-cam${ex.vetri.includes(cam.n)?' sel':''}" onclick="togVetri('${key}','${persona.replace(/'/g,"\\'")}','${cam.n}')">${cam.n}</div>`).join('');
    vetriHtml=`<div class="extra-vetri"><div class="extra-vetri-title">🪟 Vetri${showPrices&&!c.vetriPrezzi?' — Fr.'+(c.vetriPrezzo||0)+'/camera':''}</div><div class="vetri-cam-grid">${vp}</div></div>`;
  }
  let lettiHtml='';
  if(c.hasLetti){lettiHtml=`<div class="ore-extra"><label>🛏 Letti usati${showPrices?' (Fr.'+c.lettoPrezzzo+' cad.)':''}</label><div class="ore-input"><div class="ore-field"><label>N° letti</label><input type="number" min="0" value="${ex.letti}" onchange="saveLettiVal('${key}','${persona.replace(/'/g,"\\'")}',this.value)" style="width:70px;"></div></div></div>`;}
  const tot=calcExTot(ex,camName);
  const sumRows=[];
  c.extras.forEach(e=>{if(ex.items[e.id])sumRows.push(`<div class="extra-row"><span>${e.nome}</span>${showPrices?`<span>Fr.${e.prezzo}</span>`:''}</div>`);});
  if(c.hasVetri&&ex.vetri.length){const vt=c.vetriPrezzi?ex.vetri.reduce((s,v)=>s+(c.vetriPrezzi[v]||0),0):ex.vetri.length*(c.vetriPrezzo||0);sumRows.push(`<div class="extra-row"><span>Vetri (${ex.vetri.length})</span>${showPrices?`<span>Fr.${vt}</span>`:''}</div>`);}
  if(c.hasLetti&&ex.letti>0)sumRows.push(`<div class="extra-row"><span>Letti (${ex.letti})</span>${showPrices?`<span>Fr.${ex.letti*c.lettoPrezzzo}</span>`:''}</div>`);
  if(ex.ore>0||ex.min>0)sumRows.push(`<div class="extra-row"><span>Ore extra</span><span>${ex.ore}h ${ex.min>0?ex.min+'min':''}</span></div>`);
  if(showPrices&&c.tariffeCam&&camName&&c.tariffeCam[camName])sumRows.push(`<div class="extra-row"><span>Pulizia base</span><span>Fr.${c.tariffeCam[camName]}</span></div>`);
  return `<div class="extra-section">
    <div class="extra-title">Extra del giorno</div>
    ${items.length?`<div class="extra-grid">${items}</div>`:''}
    ${vetriHtml}${lettiHtml}
    <div class="ore-extra"><label>⏱ Ore extra</label><div class="ore-input">
      <div class="ore-field"><label>Ore</label><input type="number" min="0" value="${ex.ore}" onchange="updateExField('${key}','${persona.replace(/'/g,"\\'")}','ore',this.value)"></div>
      <div class="ore-field"><label>Minuti</label><input type="number" min="0" max="59" value="${ex.min}" onchange="updateExField('${key}','${persona.replace(/'/g,"\\'")}','min',this.value)"></div>
      <span style="font-size:11px;color:var(--text2);">(a fine mese)</span>
    </div></div>
    <textarea class="note-extra" placeholder="Note..." rows="2" onchange="updateExField('${key}','${persona.replace(/'/g,"\\'")}','note',this.value)">${ex.note}</textarea>
    ${sumRows.length?`<div class="extra-summary"><div class="extra-summary-title">Riepilogo</div>${sumRows.join('')}${showPrices?`<div class="extra-total"><span>Totale</span><span>Fr.${tot}${ex.ore>0||ex.min>0?' + ore':''}</span></div>`:''}</div>`:''}
    <button class="bsave" onclick="saveEx('${key}','${persona.replace(/'/g,"\\'")}')">Salva extra</button>
  </div>`;
}

function getExLocal(key,persona){
  const ck=casaId+'_'+key+'_'+persona;
  if(!extraCache[ck])extraCache[ck]={items:{},vetri:[],letti:0,ore:0,min:0,note:''};
  return extraCache[ck];
}
function togExItem(key,persona,id){const ex=getExLocal(key,persona);ex.items[id]=!ex.items[id];renderMio();}
function togVetri(key,persona,cam){const ex=getExLocal(key,persona);if(ex.vetri.includes(cam))ex.vetri=ex.vetri.filter(c=>c!==cam);else ex.vetri.push(cam);renderMio();}
function updateExField(key,persona,field,val){const ex=getExLocal(key,persona);ex[field]=field==='ore'||field==='min'||field==='letti'?parseInt(val)||0:val;if(field!=='note')renderMio();}
function saveLettiVal(key,persona,val){updateExField(key,persona,'letti',val);}
async function saveEx(key,persona){
  const ex=getExLocal(key,persona);
  await saveExtroDB(key,persona,ex);
  renderTurni();
}

}


// ═══════════════════════════════════════════
// IMPORTAZIONE TURNI DA ODS/XLSX
// ═══════════════════════════════════════════
async function importaTurni(input){
  const file=input.files[0];if(!file)return;
  toast('Lettura file...');
  const FOGLIO_CASA={piumogna:'Piumogna',cvb:'CVB',liberty:'Liberty',rustico:'Rustico',rurale:'Rurale'};
  const foglio=FOGLIO_CASA[casaId];
  if(!foglio){toast('Casa non supportata');return;}
  try{
    const ab=await file.arrayBuffer();
    const {read,utils}=XLSX;
    const wb=read(ab,{type:'array'});
    const ws=wb.Sheets[foglio];
    if(!ws){toast('Foglio '+foglio+' non trovato');return;}
    const rows=utils.sheet_to_json(ws,{header:1});
    // Trova riga intestazione (contiene 'Data')
    let hRow=-1;
    for(let i=0;i<rows.length;i++){if(rows[i]&&rows[i][0]==='Data'){hRow=i;break;}}
    if(hRow<0){toast('Intestazione non trovata');return;}
    const isPiumogna=casaId==='piumogna';
    let salvati=0,errori=0;
    for(let i=hRow+1;i<rows.length;i++){
      const r=rows[i];if(!r||!r[0])continue;
      const data=String(r[0]).trim();
      if(!data.match(/^\d{2}\/\d{2}$/))continue;
      const dd=data.split('/');
      const key='2026-'+dd[1].padStart(2,'0')+'-'+dd[0].padStart(2,'0');
      const note=isPiumogna?String(r[11]||'').trim():String(r[4]||'').trim();
      if(isPiumogna){
        // T1, T1p2, T2, T2p2, T3, T3p2, T4, T4p2
        const cols=[{t:'T1',pi:3},{t:'T1',pi:4},{t:'T2',pi:5},{t:'T2',pi:6},{t:'T3',pi:7},{t:'T3',pi:8},{t:'T4',pi:9},{t:'T4',pi:10}];
        const persMap={};
        cols.forEach(c=>{
          const v=String(r[c.pi]||'').trim();
          if(v&&v!=='-'&&v!=='NaN'){
            if(!persMap[v])persMap[v]={t:c.t,count:0};
            persMap[v].t=c.t;persMap[v].count++;
          }
        });
        for(const [persona,info] of Object.entries(persMap)){
          try{
            await saveTurnoDB(key,persona,info.t,[],note&&note!=='NaN'?note:'');
            salvati++;
          }catch(e){errori++;}
        }
      } else {
        // Solo T2 e T2p2
        const p1=String(r[2]||'').trim(),p2=String(r[3]||'').trim();
        for(const p of [p1,p2]){
          if(p&&p!=='-'&&p!=='NaN'){
            try{await saveTurnoDB(key,p,'T2',[],note&&note!=='NaN'?note:'');salvati++;}
            catch(e){errori++;}
          }
        }
      }
    }
    input.value='';
    await loadTurni();
    renderTurni();
    toast(`Importati ${salvati} turni!`+(errori>0?` (${errori} errori)`:''));
  }catch(e){
    console.error(e);
    toast('Errore lettura file');
  }
}

async function renderRiep(){
  if(!isAdmin())return;
  const Y=vMonth.getFullYear(),M=vMonth.getMonth();
  document.getElementById('riepilogo-lbl').textContent=MESI[M]+' '+Y;
  const el=document.getElementById('riepilogo-list');
  el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text2);">Caricamento...</div>';
  const from=fmtD(new Date(Y,M,1)),to=fmtD(new Date(Y,M+1,0));
  const caseLista=Object.keys(CASE);
  // Carica turni ed extra da tutte le case per il mese
  const tuttiTurni=[],tuttiExtra=[];
  for(const cid of caseLista){
    const {data:t}=await sb.from('turni').select('*').eq('casa_id',cid).gte('data',from).lte('data',to);
    if(t)t.forEach(r=>tuttiTurni.push({...r,casa_id:cid}));
    const {data:e}=await sb.from('extra').select('*').eq('casa_id',cid).gte('data',from).lte('data',to);
    if(e)e.forEach(r=>tuttiExtra.push({...r,casa_id:cid}));
  }
  // Calcola per persona
  const perPersona={};
  tuttiTurni.forEach(t=>{
    if(!perPersona[t.persona])perPersona[t.persona]={turni:{},forfait:0,oreH:0,oreM:0,extraDet:[],case:{}};
    const p=perPersona[t.persona];
    if(!p.turni[t.turno])p.turni[t.turno]=0;p.turni[t.turno]++;
    if(!p.case[t.casa_id])p.case[t.casa_id]={forfait:0,oreH:0,oreM:0};
    // Calcola forfait T2
    const c=CASE[t.casa_id];
    if(t.turno==='T2'&&t.camere&&t.camere.length){
      const nc=t.camere.length,comp=nc*30;
      p.forfait+=comp;p.case[t.casa_id].forfait+=comp;
    } else if(t.turno==='T1'||t.turno==='T4'){
      p.forfait+=55;p.case[t.casa_id].forfait+=55;
    }
  });
  tuttiExtra.forEach(e=>{
    if(!perPersona[e.persona])perPersona[e.persona]={turni:{},forfait:0,oreH:0,oreM:0,extraDet:[],case:{}};
    const p=perPersona[e.persona];
    if(!p.case[e.casa_id])p.case[e.casa_id]={forfait:0,oreH:0,oreM:0};
    const c=CASE[e.casa_id];
    let et=0;
    if(c){c.extras.forEach(ex=>{if(e.items&&e.items[ex.id])et+=ex.prezzo;});
      if(c.hasVetri&&e.vetri){if(c.vetriPrezzi){e.vetri.forEach(v=>{et+=(c.vetriPrezzi[v]||0);});}else{et+=e.vetri.length*(c.vetriPrezzo||0);}}
      if(c.hasLetti&&e.letti>0)et+=e.letti*(c.lettoPrezzzo||0);}
    p.forfait+=et;p.case[e.casa_id].forfait+=et;
    p.oreH+=e.ore||0;p.oreM+=e.min||0;
    p.case[e.casa_id].oreH+=(e.ore||0);p.case[e.casa_id].oreM+=(e.min||0);
    if(e.ore>0||e.min>0)p.extraDet.push(`${CASE[e.casa_id]?CASE[e.casa_id].nome:e.casa_id}: ${e.ore}h${e.min>0?' '+e.min+'m':''}`);
  });
  // Normalizza ore
  Object.values(perPersona).forEach(p=>{
    const totM=p.oreH*60+p.oreM;p.oreH=Math.floor(totM/60);p.oreM=totM%60;
    Object.values(p.case).forEach(c=>{const tm=c.oreH*60+c.oreM;c.oreH=Math.floor(tm/60);c.oreM=tm%60;});
  });
  // Calcola per casa
  const perCasa={};
  tuttiTurni.forEach(t=>{
    if(!perCasa[t.casa_id])perCasa[t.casa_id]={forfait:0,oreH:0,oreM:0,persone:{}};
    const c=perCasa[t.casa_id];
    const pp=perPersona[t.persona];
    if(pp&&pp.case[t.casa_id]){
      if(!c.persone[t.persona])c.persone[t.persona]=true;
    }
  });
  Object.keys(perPersona).forEach(persona=>{
    const pp=perPersona[persona];
    Object.entries(pp.case).forEach(([cid,cv])=>{
      if(!perCasa[cid])perCasa[cid]={forfait:0,oreH:0,oreM:0};
      perCasa[cid].forfait+=cv.forfait;
      perCasa[cid].oreH+=cv.oreH;perCasa[cid].oreM+=cv.oreM;
    });
  });
  // Render
  let html='';
  // Sezione per persona
  html+=`<div style="font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);">👤 Per dipendente</div>`;
  if(Object.keys(perPersona).length===0){html+='<div style="text-align:center;padding:20px;color:var(--text2);">Nessun turno in questo mese</div>';}
  Object.entries(perPersona).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([persona,p])=>{
    const turniStr=Object.entries(p.turni).map(([t,n])=>`${n}×${t}`).join(', ');
    const oreStr=p.oreH>0||p.oreM>0?`${p.oreH}h${p.oreM>0?' '+p.oreM+'m':''}`:'-';
    const caseStr=Object.keys(p.case).map(cid=>CASE[cid]?CASE[cid].nome:cid).join(', ');
    html+=`<div class="rp"><div class="rph"><div><div class="rpn">${persona}</div><div class="rpr">${caseStr}</div></div><div style="text-align:right"><div class="rpt" style="color:var(--info)">Fr.${p.forfait}</div><div style="font-size:10px;color:var(--text2);margin-top:2px;">${oreStr} ore extra</div></div></div>
    <div class="rpb"><div class="rpi"><div class="rl">Turni</div><div class="rv">${turniStr||'-'}</div></div><div class="rpi"><div class="rl">Forfait</div><div class="rv">Fr.${p.forfait}</div></div><div class="rpi"><div class="rl">Ore extra</div><div class="rv">${oreStr}</div></div></div></div>`;
  });
  // Sezione per casa
  html+=`<div style="font-size:14px;font-weight:600;margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--border);">🏠 Per struttura</div>`;
  let totGlobale=0,totOreH=0,totOreM=0;
  caseLista.forEach(cid=>{
    const c=perCasa[cid];if(!c||c.forfait===0)return;
    totGlobale+=c.forfait;totOreH+=c.oreH;totOreM+=c.oreM;
    const oreStr=c.oreH>0||c.oreM>0?`${c.oreH}h${c.oreM>0?' '+c.oreM+'m':''}`:'-';
    html+=`<div class="rp"><div class="rph"><div><div class="rpn">${CASE[cid].nome}</div></div><div style="text-align:right"><div class="rpt" style="color:var(--success)">Fr.${c.forfait}</div><div style="font-size:10px;color:var(--text2);margin-top:2px;">${oreStr} ore extra</div></div></div></div>`;
  });
  // Totale generale
  const totM=totOreH*60+totOreM;totOreH=Math.floor(totM/60);totOreM=totM%60;
  const totOreStr=totOreH>0||totOreM>0?`${totOreH}h${totOreM>0?' '+totOreM+'m':''}`:'-';
  html+=`<div style="background:#f0f5ff;border-radius:var(--r-lg);padding:16px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:14px;font-weight:600;">Totale generale</span><div style="text-align:right"><div style="font-size:24px;font-weight:600;color:var(--info)">Fr.${totGlobale}</div><div style="font-size:11px;color:var(--text2);">${totOreStr} ore extra totali</div></div></div>`;
  el.innerHTML=html;
}
function chRiep(v){vMonth=new Date(vMonth.getFullYear(),parseInt(v),1);renderRiep();}

// ═══════════════════════════════════════════
// POPUP TURNO
// ═══════════════════════════════════════════
function openTurno(key,persona,e){
  e&&e.stopPropagation();if(!isAdmin())return;
  const tp=turniDelGiorno(key)[persona];
  popTipo=tp?tp.t:null;popCamere=tp?tp.c||[]:[];
  const dt=parseD(key);
  const types=casa().turniTypes;
  const tOpts=types.map(t=>`<div class="topt${popTipo===t?' st'+t.toLowerCase():''}" onclick="selTipo('${t}',this)">${t}<br><span style="font-size:10px;opacity:0.7;">${TI[t]?TI[t].o:''}</span></div>`).join('');
  document.getElementById('pop-root').innerHTML=`<div class="pbg" onclick="closePop(event)"><div class="pbox"><button class="pcl" onclick="closePopDirect()">&#215;</button><h3>${persona}</h3><p class="psub">${GGF[dt.getDay()]} ${dt.getDate()} ${MESI[dt.getMonth()]}</p><div class="lbl">Turno</div><div class="topts">${tOpts}</div><div id="cam-sec" style="${popTipo==='T2'?'':'display:none'}"><div class="lbl">Camere</div><div class="ckopts">${casa().camere.map(c=>`<div class="cko${popCamere.includes(c.n)?' ck':''}" onclick="togCamP('${c.n}',this)"><div class="cn2">${c.n}</div><div style="font-size:9px">${c.nm}</div></div>`).join('')}</div><div class="lbl" style="margin-top:10px;">Note operative</div><textarea id="pop-note" placeholder="Es: prepara 2 letti in 102, culla in 201..." rows="2" style="width:100%;border:1px solid var(--border);border-radius:var(--r-md);padding:10px;font-size:13px;font-family:inherit;resize:none;margin-bottom:10px;">${tp&&tp.note||''}</textarea></div><button class="bsave" onclick="saveTurno('${key}','${persona.replace(/'/g,"\\'")}')">Salva</button><button class="bcl" onclick="clearTurno('${key}','${persona.replace(/'/g,"\\'")}')">Rimuovi</button></div></div>`;
}

function selTipo(t,el){popTipo=t;document.querySelectorAll('.topt').forEach(x=>x.className='topt');el.className='topt st'+t.toLowerCase();const cs=document.getElementById('cam-sec');if(cs)cs.style.display=t==='T2'?'':'none';}
function togCamP(n,el){if(popCamere.includes(n))popCamere=popCamere.filter(x=>x!==n);else popCamere.push(n);el.classList.toggle('ck');}

async function saveTurno(key,persona){
  if(!popTipo){toast('Scegli un turno');return;}
  const noteEl=document.getElementById('pop-note');
  const note=noteEl?noteEl.value:'';
  await saveTurnoDB(key,persona,popTipo,popCamere,note);
  closePopDirect();renderTurni();renderMio();
}

async function clearTurno(key,persona){
  await deleteTurnoDB(key,persona);
  closePopDirect();renderTurni();renderMio();
}

// ═══════════════════════════════════════════
// POPUP PRENOTAZIONE
// ═══════════════════════════════════════════
function openDet(id,e){
  e&&e.stopPropagation();
  const arr=prenCache[casaId]||[];
  const p=arr.find(x=>x.id===id);if(!p)return;
  const n=diffD(p.ci,p.co),tot=n*(p.tar||0);
  document.getElementById('pop-root').innerHTML=`<div class="pbg" onclick="closePop(event)"><div class="pbox"><button class="pcl" onclick="closePopDirect()">&#215;</button><h3>${p.cam} — ${p.nome||'Ospite'}</h3><p class="psub">${p.ci} → ${p.co}</p><div class="det"><div class="dr"><span>Ospiti</span><span style="color:var(--info);font-size:16px;font-weight:600;">👥 ${p.osp}</span></div><div class="dr"><span>Check-in</span><span>${p.ci}</span></div><div class="dr"><span>Check-out</span><span>${p.co}</span></div><div class="dr"><span>Notti</span><span>${n}</span></div><div class="dr"><span>Tariffa/notte</span><span>Fr.${p.tar}</span></div><div class="dr"><span>Totale</span><span>Fr.${tot}</span></div><div class="dr"><span>Canale</span><span><span class="bdg bdg-${CL[p.can]||'al'}">${capF(p.can||'altro')}</span></span></div></div><button class="bdel" onclick="delPren('${id}')">Elimina</button><button class="bcan" onclick="closePopDirect()">Chiudi</button></div></div>`;
}

function openNew(cam,key,e){
  e&&e.stopPropagation();selCan='diretto';const next=fmtD(addD(parseD(key),1));
  document.getElementById('pop-root').innerHTML=`<div class="pbg" onclick="closePop(event)"><div class="pbox"><button class="pcl" onclick="closePopDirect()">&#215;</button><h3>Nuova prenotazione</h3><p class="psub">Camera ${cam}</p><div class="lbl">Canale</div><div class="canopts"><div class="canopt" id="co-booking" onclick="selC('booking')">Booking</div><div class="canopt sdi" id="co-diretto" onclick="selC('diretto')">Interno</div><div class="canopt" id="co-airbnb" onclick="selC('airbnb')">Airbnb</div><div class="canopt" id="co-altro" onclick="selC('altro')">Altro</div></div><div class="fg f1"><div class="fl"><label>Nome ospite</label><input type="text" id="fn" placeholder="Cognome"></div></div><div class="fg"><div class="fl"><label>Check-in</label><input type="date" id="fci" value="${key}"></div><div class="fl"><label>Check-out</label><input type="date" id="fco" value="${next}"></div></div><div class="fg"><div class="fl"><label>N° ospiti</label><input type="number" id="fo" value="2" min="1" max="12"></div><div class="fl"><label>Tariffa/notte</label><input type="number" id="ft" value="120"></div></div><div class="fg f1"><div class="fl"><label>Note</label><input type="text" id="fno" placeholder="Allergie, culla..."></div></div><input type="hidden" id="fc" value="${cam}"><button class="bsave" onclick="savePren()">Salva</button><button class="bcan" onclick="closePopDirect()">Annulla</button></div></div>`;
}

function selC(c){selCan=c;['booking','diretto','airbnb','altro'].forEach(x=>{const el=document.getElementById('co-'+x);if(el)el.className='canopt'+(x===c?' s'+CL[x]:'');});}

async function savePren(){
  const cam=document.getElementById('fc').value,ci=document.getElementById('fci').value,co=document.getElementById('fco').value;
  if(!ci||!co||ci>=co){toast('Controlla le date');return;}
  const arr=prenCache[casaId]||[];
  if(arr.find(p=>p.cam===cam&&p.ci<co&&p.co>ci)){toast('Camera già occupata');return;}
  const newP={id:'p'+Date.now(),cam,nome:document.getElementById('fn').value,ci,co,osp:parseInt(document.getElementById('fo').value)||2,tar:parseInt(document.getElementById('ft').value)||120,can:selCan,note:document.getElementById('fno').value};
  if(!prenCache[casaId])prenCache[casaId]=[];
  prenCache[casaId].push(newP);
  closePopDirect();renderPren();
  await savePrenDB(newP);
}

async function delPren(id){
  const arr=prenCache[casaId]||[];
  const i=arr.findIndex(p=>p.id===id);if(i>-1)arr.splice(i,1);
  closePopDirect();renderPren();
  await deletePrenDB(id);
}

function closePop(e){if(e.target.classList.contains('pbg'))closePopDirect();}
function closePopDirect(){document.getElementById('pop-root').innerHTML='';}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

  document.getElementById('dlbl-c').textContent=fmtLbl(vDay);
